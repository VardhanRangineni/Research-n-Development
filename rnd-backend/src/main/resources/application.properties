spring.application.name=R&D Internal Software

# ── Server ─────────────────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# ── Database (all sensitive values MUST come from env vars) ────────────────────
# DB_URL has no default so it is required in production.
# application-dev.properties provides a safe localhost fallback for local dev.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:1800000}

# ── Hibernate ──────────────────────────────────────────────────────────────────
# ddl-auto is set per profile (dev=update, prod=validate via application-prod.properties)
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=${HIBERNATE_BATCH_SIZE:50}
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.fetch_size=${HIBERNATE_FETCH_SIZE:100}

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# ── HTTP compression ───────────────────────────────────────────────────────────
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript

# ── Session cookie hardening ───────────────────────────────────────────────────
# http-only is always on; secure and same-site are tightened in application-prod.properties
server.servlet.session.cookie.name=RND_SESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# ── File upload ────────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Seed / bootstrap ───────────────────────────────────────────────────────────
# Sensitive values must be supplied via env; no plaintext defaults in this file.
app.head.email=${APP_HEAD_EMAIL}
app.head.username=${APP_HEAD_USERNAME}
app.head.password=${APP_HEAD_PASSWORD}
app.seed.default-users.enabled=${APP_SEED_DEFAULT_USERS_ENABLED:false}
app.seed.migrate-legacy-roles=${APP_SEED_MIGRATE_LEGACY_ROLES:false}
