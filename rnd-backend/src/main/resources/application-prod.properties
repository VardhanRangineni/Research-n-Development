# ── Production profile overrides ───────────────────────────────────────────────

# Schema management: validate only; all changes go through Flyway migrations
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.flyway.baseline-on-migrate=true

# Seeding is off by default in production; enable once to create the first HEAD user
app.seed.default-users.enabled=${APP_SEED_DEFAULT_USERS_ENABLED:false}

# ── Secure session cookie (requires HTTPS in production) ───────────────────────
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

# ── Reduce log verbosity in production ─────────────────────────────────────────
logging.level.root=WARN
logging.level.com.medplus=INFO