# ── Dev profile overrides (localhost defaults, never used in production) ────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/rnd_db?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}

# Seed a default HEAD user on first startup in dev
app.head.email=${APP_HEAD_EMAIL:headrnd@local.dev}
app.head.username=${APP_HEAD_USERNAME:HeadUser}
app.head.password=${APP_HEAD_PASSWORD:ChangeMe@123}
app.seed.default-users.enabled=${APP_SEED_DEFAULT_USERS_ENABLED:true}

# Show SQL in dev console
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Flyway – repair failed migrations automatically in dev
spring.flyway.repair-on-migrate=true

# Image Upload API – dev defaults (override in production via env vars)
image.upload.oauth.client-id=${IMAGE_UPLOAD_OAUTH_CLIENT_ID:meditimes_client}
image.upload.oauth.client-secret=${IMAGE_UPLOAD_OAUTH_CLIENT_SECRET:Med1T!me$CL}
image.upload.transit.origin=${IMAGE_UPLOAD_TRANSIT_ORIGIN:rnd_internal}
image.upload.transit.client-id=${IMAGE_UPLOAD_TRANSIT_CLIENT_ID:medplus_rnd_app}